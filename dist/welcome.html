<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: white;
      font-family: 'Inter', sans-serif;
      text-align: center;
    }
    h1 {
      font-size: 3rem;
    }
    .username {
      color: #a78bfa;
    }
  </style>
  <script>
    function getSavedTheme() { return localStorage.getItem('theme') || 'dark'; }
    document.documentElement.setAttribute('data-theme', getSavedTheme());
    function toggleTheme() {
      const current = document.documentElement.getAttribute('data-theme') || 'dark';
      const next = current === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
      document.getElementById('theme-toggle-btn').textContent = next === 'dark' ? '☀️' : '🌙';
    }
  </script>
  <script type="module" crossorigin src="/assets/welcome-XPYoRzG5.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/supabase-CWCdB8CA.js">
  <link rel="stylesheet" crossorigin href="/assets/supabase-GTnbcBep.css">
</head>
<body>
  <button id="theme-toggle-btn" class="btn btn-secondary" style="position: fixed; top: 1rem; right: 1rem; z-index: 10000; padding: 0.5rem; border-radius: 50%; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem;" onclick="toggleTheme()">☀️</button>
  <script>document.getElementById('theme-toggle-btn').textContent = getSavedTheme() === 'dark' ? '☀️' : '🌙';</script>

  <div class="glass-card" style="padding: 2rem; display: flex; flex-direction: column; gap: 1.5rem; align-items: center; width: 100%; height: 100vh; margin: 0;">
    <h1 style="font-size: clamp(2rem, 5vw, 3rem);">Welcome <br><span class="username" id="display-name"></span></h1>
    
    <div style="display: flex; flex-wrap: wrap; gap: 1rem; width: 100%;">
      <button class="btn btn-primary" style="flex: 1; font-size: 1rem; padding: 1rem;" onclick="openUploadForm()">
        Upload Hookup
      </button>
      <button class="btn btn-secondary" style="flex: 1; font-size: 1rem; padding: 1rem;" onclick="window.location.href='manage.html'">
        Manage
      </button>
    </div>
    
    <div style="display: flex; flex-wrap: wrap; gap: 0.5rem; width: 100%;">
      <input 
        id="search-input"
        type="text" 
        placeholder="Type your location and you will see a sex patner around your area" 
        style="flex: 1; padding: 1rem; border-radius: 8px; border: 1px solid var(--input-border); background: var(--input-bg); color: var(--text-primary); font-size: 1rem;"
      />
      <button class="btn btn-primary" style="padding: 1rem;" onclick="fetchHookups()">
        Search
      </button>
    </div>

    <h3 style="align-self: flex-start; margin-top: 1rem; color: #a78bfa;">Recent Hookups</h3>
    <div id="hookups-container" style="width: 100%; display: flex; flex-direction: row; flex-wrap: wrap; gap: 1rem; justify-content: center; overflow: auto;">
      <!-- Hookups injected here -->
    </div>
    
    <button class="btn btn-outline" style="margin-top: 1rem; border-color: #ef4444; color: #ef4444;" onclick="handleLogout()">Logout</button>
  </div>

  <div id="gallery-overlay" class="overlay hidden" style="position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; display: none; justify-content: center; align-items: center; padding: 1rem;" onclick="closeGallery()">
    <div style="position: relative; max-width: 800px; width: 100%; display: flex; flex-direction: column; gap: 1rem; align-items: center;" onclick="event.stopPropagation()">
      <button style="position: absolute; top: -3rem; right: 0; background: transparent; border: none; color: white; font-size: 2rem; cursor: pointer;" onclick="closeGallery()">&times;</button>
      <div id="gallery-images" style="display: flex; gap: 1rem; overflow-x: auto; width: 100%; padding-bottom: 1rem; scroll-snap-type: x mandatory;">
        <!-- Images injected here -->
      </div>
      <p style="color: #aaa; font-size: 0.9rem;">Scroll left/right to view all pictures</p>
    </div>
  </div>

  <div id="upload-overlay" class="overlay hidden" style="position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1000; display: none; justify-content: center; align-items: center; padding: 1rem;">
    <div class="glass-card" style="padding: 2rem; max-width: 500px; width: 100%; text-align: left; overflow-y: auto; max-height: 90vh;">
      <h2 style="margin-top: 0; font-size: 1.5rem; color: #a78bfa;">Upload My Hookup</h2>
      <form id="hookup-form" onsubmit="handleHookupSubmit(event)" style="display: flex; flex-direction: column; gap: 1rem; margin-top: 1.5rem;">
        
        <div>
          <label style="display: block; margin-bottom: 0.5rem; font-size: 0.9rem; color: var(--text-muted);">Name</label>
          <input id="hookup-name" type="text" required style="width: 100%; padding: 0.8rem; border-radius: 6px; border: 1px solid var(--input-border); background: var(--input-bg); color: var(--text-primary);" />
        </div>

        <div>
          <label style="display: block; margin-bottom: 0.5rem; font-size: 0.9rem; color: var(--text-muted);">Phone Number</label>
          <input id="hookup-phone" type="tel" required style="width: 100%; padding: 0.8rem; border-radius: 6px; border: 1px solid var(--input-border); background: var(--input-bg); color: var(--text-primary);" />
        </div>

        <div>
          <label style="display: block; margin-bottom: 0.5rem; font-size: 0.9rem; color: var(--text-muted);">Pictures (Please select exactly 3)</label>
          <input id="hookup-pictures" type="file" accept="image/*" multiple required style="width: 100%; padding: 0.8rem; border-radius: 6px; border: 1px solid var(--input-border); background: var(--input-bg); color: var(--text-primary);" onchange="if(this.files.length !== 3) { alert('Please select exactly 3 pictures.'); this.value = ''; }" />
        </div>

        <div>
          <label style="display: block; margin-bottom: 0.5rem; font-size: 0.9rem; color: var(--text-muted);">Location</label>
          <input id="hookup-location" type="text" required style="width: 100%; padding: 0.8rem; border-radius: 6px; border: 1px solid var(--input-border); background: var(--input-bg); color: var(--text-primary);" />
        </div>

        <div>
          <label style="display: block; margin-bottom: 0.5rem; font-size: 0.9rem; color: var(--text-muted);">Description of Services</label>
          <textarea id="hookup-description" rows="4" required style="width: 100%; padding: 0.8rem; border-radius: 6px; border: 1px solid var(--input-border); background: var(--input-bg); color: var(--text-primary); resize: vertical;"></textarea>
        </div>

        <div style="display: flex; flex-wrap: wrap; gap: 1rem; margin-top: 1rem;">
          <button id="btn-hookup-submit" type="submit" class="btn btn-primary" style="flex: 1; padding: 1rem;">Submit</button>
          <button type="button" class="btn btn-secondary" style="flex: 1; padding: 1rem;" onclick="closeUploadForm()">Cancel</button>
        </div>
      </form>
    </div>
  </div>

</body>
</html>
